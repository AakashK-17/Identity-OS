services:
  - type: web
    name: identity-os-resume
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: identity-os-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8787
      - key: OUTPUT_ROOT
        value: /app/data/generated
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CAMPAIGN_AGENT_ENABLED
        value: "true"
      - key: DISCOVERY_ENABLED
        value: "false"
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_FRONTEND_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "1.0"
      - key: SENTRY_FRONTEND_TRACES_SAMPLE_RATE
        value: "0.2"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.2"
